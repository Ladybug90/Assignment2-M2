<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
     <style>
    /*<!-- Navigation Bar Styles -->*/
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background-color: #5092e7;
      overflow: hidden;
    }

    .navbar a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    .navbar a:hover {
      background-color: #575757;
    }
    </style>
    
</head>
<body>
<h1>Assigment 2 - Module 2</h1>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/Question1/index.html">Question 1</a>
        <a href="/Question2/index.html">Question 2</a>
        <a href="/Question3/index.html">Question 3</a>
    </div>
    
    <div class="box">
        <h2>Fun With Forms</h2>
        <hr>
        <form id="myForm">
            <h4> Billing Information</h4>
            <hr>
            <label for="name">NAME:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="address">ADDRESS:</label>
            <input type="text" id="address" name="address" required>
            <br><br>
            <label for="city">CITY:</label>
            <input type="text" id="city" name="city" required>
            <br><br>
            <label for="state">STATE/PROVINCE:</label>
            <input type="text" id="state" name="state" required>
            <br><br>
            <label for="zip">POSTAL/ZIP CODE:</label>
            <input type="text" id="zip" name="zip" required>
            <br><br>
            <label for="country">COUNTRY:</label>
            <select name="country" id="country" required>
                <option value="none" selected disabled hidden>Choose your country</option>
                <option value="US">United States</option>
                <option value="CA">Canada</option>
                <option value="UK">United Kingdom</option>
                <option value="JM">Jamaica</option>
            </select>
            <br><br>
            <label for="zip">EMAIL:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <div>
                <!--Payment Method-->
                <label for="method">PAYMENT METHOD:</label>
                <span class="payment-options">
                    <input type="radio" id="PayPal" name="payment" value="paypal"><label for="PayPal">PAYPAL</label>
                    <input type="radio" id="Visa" name="payment" value="visa"><label for="Visa">VISA</label>
                    <input type="radio" id="MasterCard" name="payment" value="mastercard"><label for="MasterCard">MASTER CARD</label><br><br>
                    

                    <label>Card Number:</label>
                    <input type="text" id="cardNumber"><br><br>

                    <label>Expiry:</label>
                    <input type="text" id="expiry"><br><br>

                    <label>CVV:</label>
                    <input type="text" id="cvv"><br><br>               
                </span>
           </div>
           
           
           
            <hr>
            <br><br>
            <h4>Shipping Information</h4>
            <hr>

           <label>
           <input type="checkbox" id="sameBilling" checked>
            Same as billing
            <br><br>
            </label>
            <div id="shippingFields">
            <label>NAME:</label>
            <input type="text" id="Name">
            <br><br>
            <label>ADDRESS:</label>
            <input type="text" id="ShippingAddress">
            <br><br>
            <label for="city">CITY:</label>
            <input type="text" id="city" name="city">
            <br><br>
            <label for="state">STATE/PROVINCE:</label>
            <input type="text" id="state" name="state">
            <br><br>
            <label for="zip">POSTAL/ZIP CODE:</label>
            <input type="text" id="zip" name="zip">
            <br><br>
            <label for="country">COUNTRY:</label>
            <select name="country" id="country">
                <option value="none" selected disabled hidden>Choose your country</option>
                <option value="US">United States</option>
                <option value="CA">Canada</option>
                <option value="UK">United Kingdom</option>
                <option value="JM">Jamaica</option>
            </select>
            <br><br>
            <label for="zip">EMAIL:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            </div>
        

           <br><br>
           <button type="submit" onclick="validate()">Submit</button>
           <br><br>
        </form>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
