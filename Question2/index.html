<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3>Fun With Forms</h3>
    <hr>
    <div class="box">
        <form action="">
            <label for="name">NAME:</label>
            <input type="text" id="name" name="name">
            <br><br>
            <label for="address">ADDRESS:</label>
            <input type="text" id="address" name="address">
            <br><br>
            <label for="city">CITY:</label>
            <input type="text" id="city" name="city">
            <br><br>
            <label for="state">STATE/PROVINCE:</label>
            <input type="text" id="state" name="state">
            <br><br>
            <label for="zip">POSTAL/ZIP CODE:</label>
            <input type="text" id="zip" name="zip">
            <br><br>
            <label for="country">COUNTRY:</label>
            <select name="country" id="country">
                <option value="none" selected disabled hidden>Choose your country</option>
                <option value="US">United States</option>
                <option value="CA">Canada</option>
                <option value="UK">United Kingdom</option>
                <option value="JM">Jamaica</option>
            </select><br><br>
            <div>
                <label for="method">PAYMENT METHOD:</label>
                <span class="payment-options">
                    <input type="radio" id="Visa" name="payment" value="visa"><label for="Visa">VISA</label>
                    <input type="radio" id="MasterCard" name="payment" value="mastercard"><label for="MasterCard">MASTER CARD</label>
                    <input type="radio" id="PayPal" name="payment" value="paypal"><label for="PayPal">PAYPAL</label>
                </span>
           </div>

           <br><br>
           <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
