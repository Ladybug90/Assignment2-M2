<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employees App</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/Question2/style.css">

    <link rel="stylesheet" href="//cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="//cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
</head>

<body>
<h1>Assignment 2 - Module 2</h1>
    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="/Question1/index.html">Question 1</a>
        <a href="/Question2/index.html">Question 2</a>
        <a href="/Question3/index.html">Question 3</a>
    </div>



<div class="container">
    <h1>Employee List</h1>

    <!-- BONUS SEARCH BAR -->
    <input type="text" id="searchInput" placeholder="Search employee name..." style="margin-bottom:15px; padding:10px; width:100%;">

    <div id="demo"></div>

    <p id="totalSalary"></p>

    <button onclick="removeStorage()">Remove Storage</button>
    <button onclick="clearStorage()">Clear Storage</button>
</div>

<script>
let allEmployees = [];

async function fetchEmployees() {
    try {
        const response = await fetch('employees.json');
        const data = await response.json();

        let employees = data.employees;

        // SORT by age
        employees.sort((a, b) => a.age - b.age);

        allEmployees = employees; // store for search

        displayEmployees(employees);

        // MAP
        const fullNames = employees.map(({firstName, lastName}) => `${firstName} ${lastName}`);
        console.log("Full Names:", fullNames);

        // REDUCE
        const totalSalary = employees.reduce((total, emp) => total + emp.salary, 0);
        document.getElementById("totalSalary").innerText = "Total Salary: $" + totalSalary;

        // FILTER
        const highEarners = employees.filter(emp => emp.salary > 55000);
        console.log("High Earners:", highEarners.map(emp => emp.firstName + " " + emp.lastName));

        // LOCAL STORAGE
        localStorage.setItem("employees", JSON.stringify(employees));
        console.log("Stored:", JSON.parse(localStorage.getItem("employees")));

    } catch (error) {
        console.error("Error:", error);
        document.getElementById("demo").innerHTML = "Error loading data!";
    }
}

// DISPLAY FUNCTION
function displayEmployees(employees) {
    let output = "<ul>";
    employees.forEach(emp => {
        output += `<li>${emp.firstName} ${emp.lastName} - Age: ${emp.age} - $${emp.salary}</li>`;
    });
    output += "</ul>";
    document.getElementById("demo").innerHTML = output;
}

// BONUS SEARCH FUNCTION
document.getElementById("searchInput").addEventListener("keyup", function() {
    const searchValue = this.value.toLowerCase();

    const filtered = allEmployees.filter(emp =>
        (`${emp.firstName} ${emp.lastName}`).toLowerCase().includes(searchValue)
    );

    displayEmployees(filtered);
});

// LOCAL STORAGE FUNCTIONS
function removeStorage() {
    localStorage.removeItem("employees");
    alert("employees removed");
}

function clearStorage() {
    localStorage.clear();
    alert("storage cleared");
}

fetchEmployees();
</script>

</body>
</html>
